---
layout: default
---
<article class="portfolio-item-detail">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.tech %}
    <div class="tech-stack">
      {% for t in page.tech %}<span class="tech-badge">{{ t }}</span>{% endfor %}
    </div>
    {% endif %}
    {% if page.github %}<a href="{{ page.github }}" class="btn" target="_blank">GitHub</a>{% endif %}
    {% if page.demo %}<a href="{{ page.demo }}" class="btn" target="_blank">Demo</a>{% endif %}
  </header>
  <div class="portfolio-content">
    {{ content }}
  </div>
</article>
